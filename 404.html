<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | CurisData</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #1a2e2a;
            background: linear-gradient(135deg, #0b4f3a, #1a8a68);
        }

        .shell {
            max-width: 560px;
            padding: 36px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #1a8a68;
        }

        h1 {
            margin: 12px 0 14px;
            font-size: clamp(32px, 6vw, 48px);
            color: #0b3d2d;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.7;
            color: #4a7060;
        }

        a {
            display: inline-block;
            padding: 14px 24px;
            border-radius: 8px;
            background: #4ecba0;
            color: #0b4f3a;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="eyebrow">404</div>
        <h1>That page isn't here.</h1>
        <p>The route may not exist yet, or the link may need to be updated in the CurisData site.</p>
        <a href="/">Return Home</a>
    </main>
</body>
</html>
