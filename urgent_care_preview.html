<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urgent Care Report Preview</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #eef3f8;
    color: #203040;
  }

  .shell {
    max-width: 1440px;
    margin: 0 auto;
    padding: 20px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    padding: 16px 18px;
    border: 1px solid #d5e0ea;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(22, 45, 68, 0.08);
  }

  .toolbar h1 {
    margin: 0 0 6px;
    font-size: 24px;
  }

  .toolbar p {
    margin: 0;
    color: #546678;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .primary {
    background: #0b6bcb;
    color: #ffffff;
  }

  .secondary {
    background: #edf4fb;
    color: #0b6bcb;
  }

  .tertiary {
    background: #f4f8f3;
    color: #1d6b43;
  }

  .frame-wrap {
    border: 1px solid #d5e0ea;
    border-radius: 14px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 14px 36px rgba(22, 45, 68, 0.1);
  }

  iframe {
    display: block;
    width: 100%;
    height: 92vh;
    border: 0;
    background: #ffffff;
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>
        <h1>Urgent Care Report Preview</h1>
        <p>This loads the Fort Worth sample report with frozen demo maps so you can review copy and layout quickly.</p>
      </div>
      <div class="actions">
        <button class="primary" id="reload-preview" type="button">Reload Preview</button>
        <button class="tertiary" id="open-frozen-preview" type="button">Open Frozen Demo</button>
        <button class="secondary" id="open-template" type="button">Open Template Only</button>
      </div>
    </div>

    <div class="frame-wrap">
      <iframe id="report-iframe" src="demographic_report_template.html?preview=1&demoMaps=frozen" title="Urgent care report preview"></iframe>
    </div>
  </div>

  <script src="report_integration.js"></script>
  <script>
    window.__CURIS_SUPPRESS_DATA_ALERTS = true;

    let runtimeConfig = {
      GOOGLE_MAPS_API_KEY: "",
      CENSUS_API_KEY: ""
    };

    const previewAddress = "4455 Camp Bowie Blvd., Fort Worth, TX 76107";
    const previewLat = 32.7354;
    const previewLng = -97.3892;
    const previewRadii = [1, 3, 5];
    const frozenPreviewSrc = "demographic_report_template.html?preview=1&demoMaps=frozen";

    function createFortWorthMapPlaceholder(title, subtitle) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
          <rect width="700" height="380" fill="#eef2eb"/>
          <path d="M0 260 C110 220, 180 215, 275 240 S470 300, 700 250 L700 380 L0 380 Z" fill="#bdd8f2"/>
          <path d="M0 282 C120 242, 210 244, 315 274 S510 332, 700 286" fill="none" stroke="#8db7dd" stroke-width="16" opacity="0.95"/>
          <path d="M-20 122 C110 142, 190 96, 286 122 S452 190, 740 130" fill="none" stroke="#e9c46a" stroke-width="28" opacity="0.95"/>
          <path d="M-20 122 C110 142, 190 96, 286 122 S452 190, 740 130" fill="none" stroke="#fff7dd" stroke-width="18" opacity="0.95"/>
          <path d="M72 0 L165 380" stroke="#d7dbd2" stroke-width="8"/>
          <path d="M242 -10 L318 390" stroke="#d7dbd2" stroke-width="8"/>
          <path d="M462 -10 L522 390" stroke="#d7dbd2" stroke-width="8"/>
          <g stroke="#9db9da" stroke-width="2" opacity="0.35">
            <path d="M0 70 H700"/><path d="M0 150 H700"/><path d="M0 230 H700"/><path d="M0 310 H700"/>
            <path d="M120 0 V380"/><path d="M280 0 V380"/><path d="M440 0 V380"/><path d="M580 0 V380"/>
          </g>
          <circle cx="352" cy="180" r="72" fill="none" stroke="#0b6bcb" stroke-width="4" opacity="0.45"/>
          <circle cx="352" cy="180" r="132" fill="none" stroke="#0b6bcb" stroke-width="4" opacity="0.25"/>
          <circle cx="352" cy="180" r="10" fill="#e74c3c"/>
          <text x="92" y="108" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#657786">Camp Bowie Blvd</text>
          <text x="498" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#657786">I-30</text>
          <text x="490" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#657786">Fort Worth</text>
          <rect x="28" y="28" width="332" height="84" rx="14" fill="#ffffff" opacity="0.95" />
          <text x="48" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#17324d">${title}</text>
          <text x="48" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4d647a">${subtitle}</text>
        </svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function buildRadiusData(population, households, families, medianIncome, countyMedianIncome, stateMedianIncome) {
      return {
        population,
        households,
        families,
        medianIncome,
        perCapitaIncome: Math.round(medianIncome * 0.47),
        countyMedianIncome,
        stateMedianIncome,
        countyName: "Travis County",
        stateName: "Texas",
        age_0_17: Math.round(population * 0.22),
        age_18_34: Math.round(population * 0.24),
        age_35_54: Math.round(population * 0.27),
        age_55_64: Math.round(population * 0.12),
        age_65plus: Math.round(population * 0.15),
        age_0_17_prior: Math.round(population * 0.21),
        age_18_34_prior: Math.round(population * 0.22),
        age_35_54_prior: Math.round(population * 0.26),
        age_55_64_prior: Math.round(population * 0.115),
        age_65plus_prior: Math.round(population * 0.14),
        income: {
          "Under $25,000": Math.round(households * 0.11),
          "$25,000 - $49,999": Math.round(households * 0.16),
          "$50,000 - $74,999": Math.round(households * 0.18),
          "$75,000 - $99,999": Math.round(households * 0.16),
          "$100,000 - $149,999": Math.round(households * 0.22),
          "$150,000+": Math.round(households * 0.17)
        },
        housing: {
          medianValue: Math.round(medianIncome * 5.3),
          medianRent: Math.round(medianIncome / 31),
          totalUnits: Math.round(households * 1.08)
        },
        employment: {
          "Labor Force Participation Rate": { local: 68.1, usa: 63.1 },
          "Unemployment Rate": { local: 3.4, usa: 4.2 },
          "Bachelor's Degree or Higher": { local: 42.8, usa: 33.7 },
          "High School Graduate or Higher": { local: 92.4, usa: 88.5 },
          "Professional/Management Occupations": { local: 45.6, usa: 38.2 }
        },
        pop2026: population,
        pop2031: Math.round(population * 1.091),
        pop_proj: Math.round(population * 1.091),
        change_pop: Math.round(population * 0.091),
        CAGR_pop: 0.0176,
        hh_proj: Math.round(households * 1.086),
        CAGR_hh: 0.0166,
        fam_proj: Math.round(families * 1.082),
        CAGR_fam: 0.0159,
        med_inc_proj: Math.round(medianIncome * 1.124),
        CAGR_med_inc: 0.0237,
        per_capita_proj: Math.round(medianIncome * 0.47 * 1.11),
        CAGR_per_capita: 0.0211
      };
    }

    function buildFortWorthFallbackPayload(reason) {
      console.warn("Using Fort Worth fallback preview payload:", reason);
      return {
        address: previewAddress,
        radii: previewRadii,
        mapImageUrl: createFortWorthMapPlaceholder("Fort Worth Trade Area", "4455 Camp Bowie Blvd., Fort Worth, TX 76107"),
        demographicData: {
          "1mile": buildRadiusData(15680, 6280, 3810, 98200, 88100, 76000),
          "3mile": buildRadiusData(89240, 34980, 21140, 101500, 88100, 76000),
          "5mile": buildRadiusData(214600, 84220, 50110, 104800, 88100, 76000)
        },
        facilityCounts: {
          ...getFallbackFacilityCounts(),
          urgentCare: 14
        },
        healthcareDemand: {
          maxRadius: 5,
          byRadius: {
            "1mile": { totalDemand: 1480, demandPer1000: 94.4, topServiceLine: { label: "Respiratory & Viral" } },
            "3mile": { totalDemand: 7920, demandPer1000: 88.8, topServiceLine: { label: "Respiratory & Viral" } },
            "5mile": { totalDemand: 17640, demandPer1000: 82.2, topServiceLine: { label: "Respiratory & Viral" } }
          },
          tableRows: [
            { label: "Respiratory & Viral", values: [420, 2210, 4880], shareOfMax: 27.7 },
            { label: "MSK / Minor Injury", values: [290, 1570, 3660], shareOfMax: 20.7 },
            { label: "ENT / Upper Airway", values: [240, 1320, 2910], shareOfMax: 16.5 },
            { label: "Skin & Soft Tissue", values: [180, 980, 2270], shareOfMax: 12.9 },
            { label: "GI / Dehydration", values: [150, 760, 1810], shareOfMax: 10.3 }
          ],
          summaryText: "Fort Worth sample preview is using a saved CurisData-style fallback snapshot because the live file-based preview could not reach the full data pipeline."
        }
      };
    }

    function buildEndpointCandidates(paths) {
      const candidates = [];
      const basePath = window.location.pathname.replace(/[^/]+$/, "");

      for (const path of paths) {
        const normalized = path.replace(/^\/+/, "");
        candidates.push("/" + normalized);
        candidates.push(basePath + normalized);
      }

      return [...new Set(candidates)];
    }

    async function loadRuntimeConfig() {
      const configEndpoints = buildEndpointCandidates(["api/login", "login"]);

      for (const endpoint of configEndpoints) {
        try {
          const response = await fetch(endpoint, { method: "GET" });
          if (!response.ok) continue;

          const config = await response.json();
          const googleMapsApiKey = config.googleMapsApiKey || "";
          const censusApiKey = config.censusApiKey || "";
          if (!googleMapsApiKey) continue;

          runtimeConfig = {
            GOOGLE_MAPS_API_KEY: googleMapsApiKey,
            CENSUS_API_KEY: censusApiKey
          };

          window.runtimeConfig = runtimeConfig;
          sessionStorage.setItem("runtimeConfig", JSON.stringify({
            googleMapsApiKey,
            censusApiKey
          }));
          return true;
        } catch (error) {
          console.warn("Preview runtime config attempt failed:", endpoint, error);
        }
      }

      const cachedConfig = sessionStorage.getItem("runtimeConfig");
      if (cachedConfig) {
        try {
          const parsed = JSON.parse(cachedConfig);
          if (parsed.googleMapsApiKey) {
            runtimeConfig = {
              GOOGLE_MAPS_API_KEY: parsed.googleMapsApiKey,
              CENSUS_API_KEY: parsed.censusApiKey || ""
            };
            window.runtimeConfig = runtimeConfig;
            return true;
          }
        } catch (error) {
          console.warn("Preview runtime cache parse failed:", error);
        }
      }

      return false;
    }

    function loadGoogleMapsScript() {
      if (window.google?.maps) {
        return Promise.resolve();
      }

      return new Promise((resolve, reject) => {
        window.__initCurisPreviewMap = () => resolve();
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(runtimeConfig.GOOGLE_MAPS_API_KEY)}&libraries=places&callback=__initCurisPreviewMap`;
        script.async = true;
        script.defer = true;
        script.onerror = () => reject(new Error("Failed to load Google Maps script."));
        document.head.appendChild(script);
      });
    }

    function ensureHiddenMap() {
      if (window.map?.getCenter) return;
      const hiddenDiv = document.createElement("div");
      hiddenDiv.style.width = "1px";
      hiddenDiv.style.height = "1px";
      hiddenDiv.style.position = "absolute";
      hiddenDiv.style.left = "-9999px";
      hiddenDiv.style.top = "-9999px";
      document.body.appendChild(hiddenDiv);
      window.map = new google.maps.Map(hiddenDiv, {
        center: { lat: previewLat, lng: previewLng },
        zoom: 12
      });
    }

    function getFallbackFacilityCounts() {
      return {
        urgentCare: 8,
        centerLat: previewLat,
        centerLng: previewLng,
        urgentCareDetails: [
          { name: "Texas Health Breeze Urgent Care", address: "5912 Convair Dr, Fort Worth, TX", lat: 32.7389, lng: -97.4011 },
          { name: "CityDoc Urgent Care", address: "3020 W 7th St, Fort Worth, TX", lat: 32.7501, lng: -97.3634 },
          { name: "CareNow Urgent Care", address: "7400 Oakmont Blvd, Fort Worth, TX", lat: 32.7333, lng: -97.4347 },
          { name: "Texas Health Breeze Urgent Care", address: "6100 Camp Bowie Blvd, Fort Worth, TX", lat: 32.7258, lng: -97.4148 },
          { name: "Baylor Scott & White Urgent Care", address: "7215 Camp Bowie West Blvd, Fort Worth, TX", lat: 32.7247, lng: -97.4419 }
        ]
      };
    }

    async function buildRealFortWorthPreviewPayload() {
      try {
        await Promise.all([
          loadBlockGroupData(),
          loadDemographicCSV(),
          loadAcsPctCSV()
        ]);

        await loadCurisDemandCSV();

        const demographicData = await fetchMultiRadiusDataFromCSV(previewLat, previewLng, previewRadii);
        const healthcareDemand = await buildHealthcareDemandSummary(previewLat, previewLng, previewRadii, demographicData);

        let facilityCounts = getFallbackFacilityCounts();
        let mapImageUrl = "";

        if (runtimeConfig.GOOGLE_MAPS_API_KEY) {
          await loadGoogleMapsScript();
          ensureHiddenMap();

          try {
            const urgentCareResults = await fetchNearbyPlaces(previewLat, previewLng, Math.max(...previewRadii), "urgent_care");
            if (urgentCareResults?.length) {
              facilityCounts = {
                urgentCare: urgentCareResults.length,
                centerLat: previewLat,
                centerLng: previewLng,
                urgentCareDetails: urgentCareResults.slice(0, 10).map(function(place) {
                  return {
                    name: place.name || "Unknown",
                    address: place.formatted_address || place.vicinity || "N/A",
                    lat: place.geometry ? place.geometry.location.lat() : null,
                    lng: place.geometry ? place.geometry.location.lng() : null
                  };
                })
              };
            }
          } catch (error) {
            console.warn("Preview urgent care lookup failed, using fallback facilities:", error);
          }

          try {
            mapImageUrl = await generateMapSnapshot(new google.maps.LatLng(previewLat, previewLng));
          } catch (error) {
            console.warn("Preview static map snapshot failed, using fallback template rendering:", error);
          }
        }

        return {
          address: previewAddress,
          radii: previewRadii,
          mapImageUrl,
          demographicData,
          facilityCounts,
          healthcareDemand
        };
      } catch (error) {
        return buildFortWorthFallbackPayload(error);
      }
    }

    async function loadPreview() {
      try {
        const hasRuntimeConfig = await loadRuntimeConfig();
        if (!hasRuntimeConfig) {
          console.warn("Preview runtime config unavailable. Falling back to data-only mode.");
        }

        const payload = await buildRealFortWorthPreviewPayload();
        const iframeWindow = iframe.contentWindow;
        if (iframeWindow && window.google?.maps) {
          iframeWindow.google = window.google;
        }

        populateReportTemplate(
          payload.address,
          payload.demographicData,
          payload.facilityCounts,
          payload.mapImageUrl,
          payload.radii,
          payload.healthcareDemand
        );
      } catch (error) {
        console.error("Failed to build Fort Worth preview payload:", error);
        const payload = buildFortWorthFallbackPayload(error);
        populateReportTemplate(
          payload.address,
          payload.demographicData,
          payload.facilityCounts,
          payload.mapImageUrl,
          payload.radii,
          payload.healthcareDemand
        );
      }
    }

    const iframe = document.getElementById("report-iframe");
    const reloadButton = document.getElementById("reload-preview");
    const frozenButton = document.getElementById("open-frozen-preview");
    const templateButton = document.getElementById("open-template");

    iframe.addEventListener("load", loadPreview);
    reloadButton.addEventListener("click", function() {
      iframe.src = frozenPreviewSrc;
    });
    frozenButton.addEventListener("click", function() {
      iframe.src = frozenPreviewSrc;
    });
    templateButton.addEventListener("click", function() {
      window.open(frozenPreviewSrc, "_blank");
    });
  </script>
</body>
</html>
