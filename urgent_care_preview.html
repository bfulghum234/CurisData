<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urgent Care Report Preview</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #eef3f8;
    color: #203040;
  }

  .shell {
    max-width: 1440px;
    margin: 0 auto;
    padding: 20px;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
    padding: 16px 18px;
    border: 1px solid #d5e0ea;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 10px 30px rgba(22, 45, 68, 0.08);
  }

  .toolbar h1 {
    margin: 0 0 6px;
    font-size: 24px;
  }

  .toolbar p {
    margin: 0;
    color: #546678;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .primary {
    background: #0b6bcb;
    color: #ffffff;
  }

  .secondary {
    background: #edf4fb;
    color: #0b6bcb;
  }

  .frame-wrap {
    border: 1px solid #d5e0ea;
    border-radius: 14px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 14px 36px rgba(22, 45, 68, 0.1);
  }

  iframe {
    display: block;
    width: 100%;
    height: 92vh;
    border: 0;
    background: #ffffff;
  }
</style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div>
        <h1>Urgent Care Report Preview</h1>
        <p>This loads the real report template with sample urgent care data so you can review copy and layout quickly.</p>
      </div>
      <div class="actions">
        <button class="primary" id="reload-preview" type="button">Reload Preview</button>
        <button class="secondary" id="open-template" type="button">Open Template Only</button>
      </div>
    </div>

    <div class="frame-wrap">
      <iframe id="report-iframe" src="demographic_report_template.html" title="Urgent care report preview"></iframe>
    </div>
  </div>

  <script src="report_integration.js"></script>
  <script>
    function createMapPlaceholder(address) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="700" height="380" viewBox="0 0 700 380">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#d9ecff" />
              <stop offset="100%" stop-color="#f5fbff" />
            </linearGradient>
          </defs>
          <rect width="700" height="380" fill="url(#bg)" />
          <g opacity="0.16" stroke="#0b6bcb" stroke-width="2">
            <path d="M0 70 H700" />
            <path d="M0 150 H700" />
            <path d="M0 230 H700" />
            <path d="M0 310 H700" />
            <path d="M120 0 V380" />
            <path d="M280 0 V380" />
            <path d="M440 0 V380" />
            <path d="M580 0 V380" />
          </g>
          <circle cx="352" cy="180" r="72" fill="none" stroke="#0b6bcb" stroke-width="4" opacity="0.45" />
          <circle cx="352" cy="180" r="132" fill="none" stroke="#0b6bcb" stroke-width="4" opacity="0.25" />
          <circle cx="352" cy="180" r="10" fill="#e74c3c" />
          <rect x="28" y="28" width="308" height="82" rx="14" fill="#ffffff" opacity="0.95" />
          <text x="48" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#17324d">Preview Map Placeholder</text>
          <text x="48" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4d647a">${address}</text>
          <text x="48" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#4d647a">Preview mode uses sample data and a static placeholder map.</text>
        </svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function buildRadiusData(population, households, families, medianIncome, countyMedianIncome, stateMedianIncome) {
      return {
        population,
        households,
        families,
        medianIncome,
        perCapitaIncome: Math.round(medianIncome * 0.47),
        countyMedianIncome,
        stateMedianIncome,
        countyName: "Travis County",
        stateName: "Texas",
        age_0_17: Math.round(population * 0.22),
        age_18_34: Math.round(population * 0.24),
        age_35_54: Math.round(population * 0.27),
        age_55_64: Math.round(population * 0.12),
        age_65plus: Math.round(population * 0.15),
        age_0_17_prior: Math.round(population * 0.21),
        age_18_34_prior: Math.round(population * 0.22),
        age_35_54_prior: Math.round(population * 0.26),
        age_55_64_prior: Math.round(population * 0.115),
        age_65plus_prior: Math.round(population * 0.14),
        income: {
          "Under $25,000": Math.round(households * 0.11),
          "$25,000 - $49,999": Math.round(households * 0.16),
          "$50,000 - $74,999": Math.round(households * 0.18),
          "$75,000 - $99,999": Math.round(households * 0.16),
          "$100,000 - $149,999": Math.round(households * 0.22),
          "$150,000+": Math.round(households * 0.17)
        },
        housing: {
          medianValue: Math.round(medianIncome * 5.3),
          medianRent: Math.round(medianIncome / 31),
          totalUnits: Math.round(households * 1.08)
        },
        employment: {
          "Labor Force Participation Rate": { local: 68.1, usa: 63.1 },
          "Unemployment Rate": { local: 3.4, usa: 4.2 },
          "Bachelor's Degree or Higher": { local: 42.8, usa: 33.7 },
          "High School Graduate or Higher": { local: 92.4, usa: 88.5 },
          "Professional/Management Occupations": { local: 45.6, usa: 38.2 }
        },
        pop2026: population,
        pop2031: Math.round(population * 1.091),
        pop_proj: Math.round(population * 1.091),
        change_pop: Math.round(population * 0.091),
        CAGR_pop: 0.0176,
        hh_proj: Math.round(households * 1.086),
        CAGR_hh: 0.0166,
        fam_proj: Math.round(families * 1.082),
        CAGR_fam: 0.0159,
        med_inc_proj: Math.round(medianIncome * 1.124),
        CAGR_med_inc: 0.0237,
        per_capita_proj: Math.round(medianIncome * 0.47 * 1.11),
        CAGR_per_capita: 0.0211
      };
    }

    function getPreviewPayload() {
      const address = "5900 Balcones Dr, Austin, TX 78731";
      return {
        address,
        radii: [1, 3, 5],
        mapImageUrl: createMapPlaceholder(address),
        demographicData: {
          "1mile": buildRadiusData(15680, 6280, 3810, 98200, 88100, 76000),
          "3mile": buildRadiusData(89240, 34980, 21140, 101500, 88100, 76000),
          "5mile": buildRadiusData(214600, 84220, 50110, 104800, 88100, 76000)
        },
        facilityCounts: {
          urgentCare: 14,
          centerLat: 30.3346,
          centerLng: -97.7607,
          urgentCareDetails: [
            { name: "CareNow Urgent Care", address: "3801 N Capital of Texas Hwy, Austin, TX" },
            { name: "FastMed Urgent Care", address: "10001 Research Blvd, Austin, TX" },
            { name: "Premier ER & Urgent Care", address: "3300 Bee Caves Rd, West Lake Hills, TX" },
            { name: "Baylor Scott & White Urgent Care", address: "11001 Lakeline Mall Dr, Austin, TX" },
            { name: "Ascension Seton Express Care", address: "2500 W Parmer Ln, Austin, TX" },
            { name: "NextCare Urgent Care", address: "1701 W Ben White Blvd, Austin, TX" },
            { name: "Carbon Health Urgent Care", address: "3300 W Anderson Ln, Austin, TX" },
            { name: "Austin Regional Clinic After Hours", address: "6835 Austin Center Blvd, Austin, TX" }
          ]
        },
        healthcareDemand: {
          maxRadius: 5,
          byRadius: {
            "1mile": {
              totalDemand: 1480,
              demandPer1000: 94.4,
              topServiceLine: { label: "Respiratory & Viral" }
            },
            "3mile": {
              totalDemand: 7920,
              demandPer1000: 88.8,
              topServiceLine: { label: "Respiratory & Viral" }
            },
            "5mile": {
              totalDemand: 17640,
              demandPer1000: 82.2,
              topServiceLine: { label: "Respiratory & Viral" }
            }
          },
          tableRows: [
            { label: "Respiratory & Viral", values: [420, 2210, 4880], shareOfMax: 27.7 },
            { label: "MSK / Minor Injury", values: [290, 1570, 3660], shareOfMax: 20.7 },
            { label: "ENT / Upper Airway", values: [240, 1320, 2910], shareOfMax: 16.5 },
            { label: "Skin & Soft Tissue", values: [180, 980, 2270], shareOfMax: 12.9 },
            { label: "GI / Dehydration", values: [150, 760, 1810], shareOfMax: 10.3 }
          ],
          summaryText: "Respiratory & Viral is the leading Curis demand driver within the 5-mile trade area, contributing 4,880 estimated annual demand events and 82.2 demand events per 1,000 residents overall."
        }
      };
    }

    function loadPreview() {
      const payload = getPreviewPayload();
      populateReportTemplate(
        payload.address,
        payload.demographicData,
        payload.facilityCounts,
        payload.mapImageUrl,
        payload.radii,
        payload.healthcareDemand
      );
    }

    const iframe = document.getElementById("report-iframe");
    const reloadButton = document.getElementById("reload-preview");
    const templateButton = document.getElementById("open-template");

    iframe.addEventListener("load", loadPreview);
    reloadButton.addEventListener("click", function() {
      iframe.src = "demographic_report_template.html";
    });
    templateButton.addEventListener("click", function() {
      window.open("demographic_report_template.html", "_blank");
    });
  </script>
</body>
</html>
